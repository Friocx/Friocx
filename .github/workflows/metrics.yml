name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          
          # 🚀 ICONS + FULL HISTORY
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          # Removed "recent_load" so it scans all your repos!

      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
