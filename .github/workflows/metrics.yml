name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: General Stats (Fixed duplicate 'base' line)
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      # Step 2: Isolated Isometric Calendar (CLEAN VERSION)
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: isocalendar.svg
          base: "" 
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Best for a compact "recent" view
          
          # This CSS removes the "Contributions calendar" text and the horizontal lines
          extras_css: |
            h2, .divider, line, .stats { 
              display: none !important; 
            }
