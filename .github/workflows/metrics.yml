name: Repository Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repository metrics
        uses: lowlighter/metrics@latest
        with:
          # Changed to match your screenshot "METRICS_TOKEN"
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}

          # Your details
          user: Friocx
          repo: Friocx

          # Template configuration
          template: repository
          filename: metrics.repository.svg

          # Base content
          base: header, contents, community

          # Plugins
          plugin_lines: yes
          plugin_followup: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
