name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: General Stats (The dots)
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8

      # Step 2: Isometric Calendar (The 3D view)
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Step 3: Technology Icons (The Skill Bar)
      - name: Skill Icons
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: skills.svg
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons # This shows JUST the logos
          plugin_topics_sort: stars
