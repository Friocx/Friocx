name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          # Fixed the space in the token syntax
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, activity, community, repositories, metadata
          
          # This line tells it to look at projects you DON'T own too
          repositories_affiliations: owner, collaborator, organization_member
          
          # Language settings (Only list these once!)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
