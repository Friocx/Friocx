name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: General Stats (Languages, Repos, etc.)
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      # Step 2: Isolated Isometric Calendar
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: isocalendar.svg
          base: "" # This hides everything except the plugin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
