name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: General Stats with LANGUAGE ICONS
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: metrics.svg
          base: header, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          
          # 🚀 Icons and Details
          plugin_languages: yes
          plugin_languages_ignored: html, css       # Optional: hide simple stuff to show more PHP/JS
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes             # This enables the extra details
          plugin_languages_limit: 8

      # Step 2: Isolated Isometric Calendar
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.FRIOCX_METRICS_TOKEN }}
          user: Friocx
          template: classic
          filename: isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
